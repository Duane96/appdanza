{% extends "base_tenant.html" %}
{% block content %}
<div class="row"><div class="col-md-6 mx-auto"><div class="card border-0 shadow-sm p-4 bg-white">
    <h4 class="fw-bold mb-3">Registrar Nuevo Alumno</h4>
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Nombres</label><input type="text" name="nombres" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Apellidos</label><input type="text" name="apellidos" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Identificación (Cédula/TI)</label><input type="text" name="identificacion" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Teléfono</label><input type="text" name="telefono" class="form-control"></div>
        <button type="submit" class="btn btn-tenant-primary w-100">Guardar Alumno y Generar QR</button>
    </form>
</div></div></div>
{% endblock %}
