<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | {{ request.tenant.nombre }}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --login-primary: {{ request.tenant.color_primario|default:"#6f42c1" }};
            --login-secondary: {{ request.tenant.color_secundario|default:"#e83e8c" }};
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            position: relative;
            
            /* 🚗 EFECTO VINILO / ENVOLTURA COMPLETA: Cubre todo el fondo y los relieves */
            {% if request.tenant.login_imagen %}
                background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.85)), url('{{ request.tenant.login_imagen.url }}') center/cover no-repeat fixed;
            {% elif request.tenant.hero_imagen_1 %}
                background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.85)), url('{{ request.tenant.hero_imagen_1.url }}') center/cover no-repeat fixed;
            {% else %}
                background: linear-gradient(135deg, #0f172a 0%, var(--login-primary) 100%);
            {% endif %}
        }

        /* 💎 EFECTO CRISTAL ADAPTADO AL RELIEVE (Glassmorphism sutil, no cuadro blanco rígido) */
        .login-card {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            /* Usamos un fondo blanco ultra-translúcido para que la imagen se absorba en el relieve */
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
            height: auto; /* Evita que se vuelva un cuadro gigante vertical */
        }

        /* Ajustes de textos para alto contraste sobre cristal oscuro */
        .login-title {
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .login-subtitle {
            color: rgba(255, 255, 255, 0.65) !important;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        /* Personalización de Inputs integrados al relieve oscuro */
        .form-control {
            border-radius: 12px;
            padding: 0.65rem 1rem;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff !important;
            transition: all 0.25s ease;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.6);
            border-color: var(--login-primary);
            box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.1);
        }

        /* Iconos de los inputs */
        .input-group-text {
            background: rgba(15, 23, 42, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: rgba(255, 255, 255, 0.5) !important;
        }

        /* Botón Corporativo Neón de Alto Impacto */
        .btn-login-submit {
            background: linear-gradient(135deg, var(--login-primary), var(--login-secondary));
            color: #ffffff !important;
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        .btn-login-submit:hover {
            transform: translateY(-1px);
            filter: brightness(110%);
            box-shadow: 0 8px 25px rgba(111, 66, 193, 0.4);
        }

        .back-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.2s;
            font-size: 0.85rem;
        }
        .back-link:hover {
            color: #ffffff;
        }
        
        .brand-logo-login img {
            max-height: 65px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center px-3">
        <div class="card login-card p-4 p-sm-4.5">
            
            <div class="text-center mb-4">
                <div class="brand-logo-login mb-2">
                    {% if request.tenant.logo %}
                        <img src="{{ request.tenant.logo.url }}" alt="Logo {{ request.tenant.nombre }}">
                    {% else %}
                        <div class="d-inline-flex p-3 rounded-circle bg-dark bg-opacity-20 mb-2" style="color: var(--login-primary);">
                            <i class="bi bi-music-note-beamed fs-2"></i>
                        </div>
                    {% endif %}
                </div>
                <h4 class="login-title m-0">Ingresar al Portal</h4>
                <p class="login-subtitle small mt-1 mb-0">Academia <strong>{{ request.tenant.nombre }}</strong></p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">Nombre de Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0" style="border-radius: 12px 0 0 12px;"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" placeholder="Usuario o correo" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0" style="border-radius: 12px 0 0 12px;"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="d-grid gap-2 mb-2">
                    <button type="submit" class="btn btn-login-submit w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar a mi Cuenta
                    </button>
                </div>

                <div class="text-center mt-3 border-top border-secondary border-opacity-20 pt-3">
                    <a href="/{{ request.tenant.slug }}/" class="back-link small fw-medium">
                        <i class="bi bi-arrow-left small me-1"></i> Volver a la Academia
                    </a>
                </div>
            </form>

        </div>
    </div>

</body>
</html>
